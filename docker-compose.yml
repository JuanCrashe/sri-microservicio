services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sri-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:5000
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:5000}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
    depends_on:
      - backend
    networks:
      - sri-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sri}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sri-network
    restart: unless-stopped

networks:
  sri-network:
    driver: bridge

volumes:
  pgdata:
